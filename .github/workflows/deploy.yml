name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          check-latest: true

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run D1 migrations
        run: |
          ./node_modules/.bin/wrangler d1 execute kairos-db \
            --remote \
            --file=./drizzle/0000_strange_zaladane.sql \
            || echo "SKIP: tables already exist"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build with OpenNext
        run: ./node_modules/.bin/opennextjs-cloudflare build
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: https://kairos.礼字号.中国
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Deploy to Cloudflare Workers
        run: ./node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        run: |
          sleep 5
          curl -sf -o /dev/null -w "%{http_code}" "https://kairos.礼字号.中国/" || echo "WARN: smoke test returned non-200"