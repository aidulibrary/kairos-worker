# ── KAIROS · Cloudflare Workers 部署配置 ──
# wrangler.toml — Cloudflare 的边缘计算平台配置文件

name = "kairos-worker"
main = ".open-next/worker.js"
compatibility_date = "2025-06-15"
compatibility_flags = ["nodejs_compat"]
assets = { directory = ".open-next/assets" }

# ── D1 数据库（SQLite 边缘数据库） ──
[[d1_databases]]
binding = "DB"
database_name = "kairos-db"
database_id = "440535b5-dfb3-4ac7-83e8-0893ce5811f7"

# ── R2 文件存储（对象存储，替代 S3） ──
[[r2_buckets]]
binding = "R2"
bucket_name = "kairos-uploads"

# ── 环境变量 ──
# ⚠️ 密钥已迁移至 wrangler secrets，不再明文存储在 wrangler.toml
# 本地设置: npx wrangler secret put DEEPSEEK_API_KEY
# 本地设置: npx wrangler secret put BETTER_AUTH_SECRET
# CI 设置: GitHub Secrets → DEEPSEEK_API_KEY / BETTER_AUTH_SECRET
[vars]
NODE_VERSION = "20"
R2_PUBLIC_URL = "https://pub-125ff6c969c14c20b888e94db8e2979a.r2.dev"
NEXTJS_MODE = "production"
BETTER_AUTH_URL = "https://kairos.礼字号.中国"

# ── 国内加速：启用 Cloudflare 京东云节点 ──
# Cloudflare Pages 默认使用全球 CDN，包括国内京东云/移动节点
# 无需额外配置，访问速度约 50-200ms

# ── 路由（顶级配置：指定哪些 URL 触发此 Worker） ──
routes = [ { pattern = "kairos.礼字号.中国/*", zone_name = "礼字号.中国" } ]

# ── 日志 ──
[observability]
enabled = true