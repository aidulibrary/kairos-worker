# ── KAIROS · Cloudflare Workers 部署配置 ──
# wrangler.toml — Cloudflare 的边缘计算平台配置文件

name = "kairos"
main = ".open-next/worker.js"
compatibility_date = "2025-05-28"
compatibility_flags = ["nodejs_compat"]
assets = { directory = ".open-next/assets" }

# ── D1 数据库（SQLite 边缘数据库） ──
[[d1_databases]]
binding = "DB"
database_name = "kairos-db"
database_id = "440535b5-dfb3-4ac7-83e8-0893ce5811f7"  # ← 部署时替换

# ── R2 文件存储（对象存储，替代 S3） ──
[[r2_buckets]]
binding = "R2"
bucket_name = "kairos-uploads"
# R2 桶不需要预先创建 database_id

# ── 环境变量 ──
[vars]
NODE_VERSION = "18"
DEEPSEEK_API_KEY = "sk-e75f3b6c471c4f979bf8dd61fd99c1da"  # ← 部署时填入你的 DeepSeek API Key
R2_PUBLIC_URL = "https://pub-125ff6c969c14c20b888e94db8e2979a.r2.dev"
NEXTJS_MODE = "production"
BETTER_AUTH_SECRET = "69VrLUz2YObWnY2aQWTrNLpEEvss6JJQjpyhszDSSUo="
BETTER_AUTH_URL = "https://kairos.wuguzi.workers.dev"

# ── 国内加速：启用 Cloudflare 京东云节点 ──
# Cloudflare Pages 默认使用全球 CDN，包括国内京东云/移动节点
# 无需额外配置，访问速度约 50-200ms

# ── 日志 ──
[observability]
enabled = true
